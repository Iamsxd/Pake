name: Build App With Pake CLI
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        default: 'macos-latest'
        type: choice
        options:
          - 'windows-latest'
          - 'macos-latest'
          - 'ubuntu-24.04'
      url:
        description: 'URL'
        required: true
      name:
        description: 'Name, English, Linux no capital'
        required: true
      icon:
        description: 'Icon, Image URL, Optional'
        required: false
      width:
        description: 'Width, Optional'
        required: false
        default: '1200'
      height:
        description: 'Height, Optional'
        required: false
        default: '780'
      fullscreen:
        description: 'Fullscreen, At startup, Optional'
        required: false
        type: boolean
        default: false
      hide_title_bar:
        description: 'Hide TitleBar, MacOS only, Optional'
        required: false
        type: boolean
        default: false
      multi_arch:
        description: 'MultiArch, MacOS only, Optional'
        required: false
        type: boolean
        default: false
      targets:
        description: 'Targets, Linux only, Optional'
        required: false
        default: 'deb'
        type: choice
        options:
          - 'deb'
          - 'appimage'
          - 'rpm'

jobs:
  build:
    name: ${{ inputs.platform }}
    runs-on: ${{ inputs.platform }}
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Rust for ubuntu-24.04
        if: inputs.platform == 'ubuntu-24.04'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-unknown-linux-musl

      - name: Install Rust for windows-latest
        if: inputs.platform == 'windows-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-msvc
          target: x86_64-pc-windows-msvc

      - name: Install Rust for macos-latest
        if: inputs.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-apple-darwin

      - name: Install dependencies (ubuntu only)
        if: inputs.platform == 'ubuntu-24.04'
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: libsoup3.0-dev libdbus-1-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev gnome-video-effects gnome-video-effects-extra
          version: 1.1

      - name: Install pake-cli local
        shell: bash
        run: |
          echo "install pake on local"
          npm install pake-cli

      - name: Rust cache restore
        uses: actions/cache/restore@v3
        id: cache_store
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            node_modules/pake-cli/src-tauri/target/
          key: ${{ inputs.platform }}-cargo-${{ hashFiles('node_modules/pake-cli/src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: |
          npm install shelljs
          npm install axios

      - name: Build with pake-cli
        run: |
          node ./script/build_with_pake_cli.js
        env:
          URL: ${{ inputs.url }}
          NAME: ${{ inputs.name }}
          ICON: ${{ inputs.icon }}
          HEIGHT: ${{ inputs.height }}
          WIDTH: ${{ inputs.width }}
          HIDE_TITLE_BAR: ${{ inputs.hide_title_bar }}
          FULLSCREEN: ${{ inputs.fullscreen }}
          MULTI_ARCH: ${{ inputs.multi_arch }}
          TARGETS: ${{ inputs.targets }}
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          PKG_CONFIG_ALLOW_SYSTEM_LIBS: 1
          PKG_CONFIG_ALLOW_SYSTEM_CFLAGS: 1

      # 添加调试步骤 - Windows
      - name: Debug - Find output files (Windows)
        if: inputs.platform == 'windows-latest'
        shell: powershell
        run: |
          Write-Host "=== Current directory contents ==="
          Get-ChildItem -Force
          Write-Host "`n=== node_modules/pake-cli structure ==="
          if (Test-Path "node_modules/pake-cli") {
            Get-ChildItem "node_modules/pake-cli" -Force
            if (Test-Path "node_modules/pake-cli/output") {
              Write-Host "`n=== pake-cli/output contents ==="
              Get-ChildItem "node_modules/pake-cli/output" -Recurse -Force
            }
            if (Test-Path "node_modules/pake-cli/src-tauri") {
              Write-Host "`n=== src-tauri structure ==="
              Get-ChildItem "node_modules/pake-cli/src-tauri" -Recurse -Directory -Force | Select-Object FullName
            }
          }
          Write-Host "`n=== Looking for executable files recursively ==="
          Get-ChildItem -Recurse -Include *.exe,*.msi -Force -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "`n=== Looking for bundle directories ==="
          Get-ChildItem -Recurse -Directory -Name "*bundle*" -Force -ErrorAction SilentlyContinue | Select-Object FullName

      # 添加调试步骤 - macOS/Linux
      - name: Debug - Find output files (Unix)
        if: inputs.platform != 'windows-latest'
        shell: bash
        run: |
          echo "=== Current directory contents ==="
          ls -la
          echo -e "\n=== node_modules/pake-cli structure ==="
          if [ -d "node_modules/pake-cli" ]; then
            ls -la node_modules/pake-cli/
            if [ -d "node_modules/pake-cli/output" ]; then
              echo -e "\n=== pake-cli/output contents ==="
              find node_modules/pake-cli/output -type f -exec ls -la {} \;
            fi
            if [ -d "node_modules/pake-cli/src-tauri" ]; then
              echo -e "\n=== src-tauri structure ==="
              find node_modules/pake-cli/src-tauri -type d -name "*target*" -o -name "*bundle*" 2>/dev/null
            fi
          fi
          echo -e "\n=== Looking for executable files recursively ==="
          find . -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" 2>/dev/null | head -20
          echo -e "\n=== Looking for bundle directories ==="
          find . -type d -name "*bundle*" 2>/dev/null | head -10

      # 修改后的上传步骤 - 多路径尝试
      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ inputs.platform }}.zip
          path: |
            node_modules/pake-cli/output/**/*
            node_modules/pake-cli/src-tauri/target/release/bundle/**/*
            node_modules/pake-cli/src-tauri/target/release/*.exe
            node_modules/pake-cli/src-tauri/target/release/*.msi
            node_modules/pake-cli/src-tauri/target/release/*.dmg
            node_modules/pake-cli/src-tauri/target/release/*.AppImage
            node_modules/pake-cli/src-tauri/target/release/*.deb
            node_modules/pake-cli/src-tauri/target/release/*.rpm
            **/*.exe
            **/*.msi
            **/*.dmg
            **/*.AppImage
            **/*.deb
            **/*.rpm
          retention-days: 3
          if-no-files-found: warn  # 如果没找到文件只警告，不失败

      - name: Rust cache store
        uses: actions/cache/save@v3
        if: steps.cache_store.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            node_modules/pake-cli/src-tauri/target/
          key: ${{ inputs.platform }}-cargo-${{ hashFiles('node_modules/pake-cli/src-tauri/Cargo.lock') }}
